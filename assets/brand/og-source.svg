  <text x="72" y="148" fill="#10283d" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4">MVDB / SYSTEMS FIELD NOTES</text>
  <text x="72" y="270" fill="#10283d" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="-4">Practical notes</text>
